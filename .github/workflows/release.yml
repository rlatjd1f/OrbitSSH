name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: orbit-ssh-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Verify release version
        run: |
          EXPECTED_TAG="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package macOS application
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: OrbitSSH-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Generate release notes
        run: |
          PREVIOUS_TAG="$(git tag --list 'v[0-9]*' --sort=-version:refname | awk -v current="$GITHUB_REF_NAME" '$0 != current { print; exit }')"
          node scripts/generate-release-notes.mjs "$PREVIOUS_TAG" "$GITHUB_REF_NAME" > release-notes.md
          cat release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$GITHUB_REF_NAME"
          TITLE="Orbit SSH $TAG"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | while read -r ASSET; do
              case "$ASSET" in
                *.dmg) ;;
                *) gh release delete-asset "$TAG" "$ASSET" --yes --repo "$GITHUB_REPOSITORY" ;;
              esac
            done
            gh release upload "$TAG" release/*.dmg --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" release/*.dmg --verify-tag --title "$TITLE" --notes-file release-notes.md --repo "$GITHUB_REPOSITORY"
          fi
